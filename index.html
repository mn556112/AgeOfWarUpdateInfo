<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>패치노트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; }

    header { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; padding: 1.25rem 2rem; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    header h1 { font-size: 18px; font-weight: 500; color: #fff; }
    header .tag { font-size: 11px; background: #2a2a2a; color: #aaa; padding: 3px 10px; border-radius: 99px; }

    /* ── 배너 슬라이더 ── */
    #banner-wrap { width: 100%; max-width: 960px; margin: 0 auto; padding: 1.5rem 1.5rem 0; display: none; }
    #banner-wrap.visible { display: block; }
    .banner-slider { position: relative; width: 100%; aspect-ratio: 16/5; border-radius: 16px; overflow: hidden; background: #1a1a1a; }
    .banner-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.6s ease; }
    .banner-slide.active { opacity: 1; }
    .banner-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .banner-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 1.5rem 1.25rem 1rem; background: linear-gradient(transparent, rgba(0,0,0,0.72)); font-size: 15px; font-weight: 500; color: #fff; }
    .banner-dots { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
    .banner-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; cursor: pointer; transition: background 0.2s; border: none; padding: 0; }
    .banner-dot.active { background: #fff; }

    /* ── 레이아웃 ── */
    .layout { display: flex; flex: 1; max-width: 960px; margin: 0 auto; width: 100%; padding: 2rem 1.5rem; gap: 2rem; align-items: flex-start; }

    .sidebar { width: 160px; flex-shrink: 0; position: sticky; top: 2rem; display: none; }
    .sidebar.visible { display: block; }
    .sidebar-label { font-size: 10px; font-weight: 500; color: #444; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
    .version-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #666; transition: background 0.15s, color 0.15s; margin-bottom: 4px; border: 1px solid transparent; }
    .version-item:hover { background: #1a1a1a; color: #ccc; }
    .version-item.active { background: #1e1e1e; color: #fff; border-color: #2e2e2e; }
    .version-item .v-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; flex-shrink: 0; }
    .version-item.active .v-dot { background: #4ade80; }
    .version-item .v-label { font-weight: 500; }
    .version-item .v-date { font-size: 11px; color: #444; margin-top: 1px; }
    .version-item-inner { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .latest-badge { font-size: 9px; background: #0d2e1f; color: #4ade80; padding: 1px 6px; border-radius: 99px; flex-shrink: 0; }

    .main { display: none; flex: 1; min-width: 0; }
    .main.visible { display: block; }
    .version-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .version-text { font-size: 26px; font-weight: 500; color: #fff; }
    .date-text { font-size: 13px; color: #666; }
    .section-title { font-size: 11px; font-weight: 500; color: #555; letter-spacing: 0.1em; text-transform: uppercase; margin: 2rem 0 0.75rem; padding-bottom: 8px; border-bottom: 1px solid #222; }
    .card { display: flex; gap: 16px; align-items: flex-start; background: #1a1a1a; border: 1px solid #252525; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; transition: border-color 0.15s; }
    .card:hover { border-color: #333; }
    .card-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .card-img-placeholder { width: 60px; height: 60px; border-radius: 8px; background: #222; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .card-body { flex: 1; min-width: 0; }
    .card-title { font-size: 15px; font-weight: 500; color: #fff; margin-bottom: 6px; }
    .card-desc { font-size: 13px; color: #888; line-height: 1.65; }
    .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 99px; margin-bottom: 6px; }
    .badge-new { background: #0d2e1f; color: #4ade80; }
    .badge-fix { background: #2e1f0d; color: #f59e0b; }

    #loading { text-align: center; padding: 4rem 1rem; color: #555; font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; }
    .spinner { width: 36px; height: 36px; border: 3px solid #2a2a2a; border-top: 3px solid #aaa; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error { text-align: center; padding: 4rem; color: #666; font-size: 14px; width: 100%; }

    /* ── 블록 등장 애니메이션 ── */
    @keyframes blockIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .block-anim {
      opacity: 0;
      animation: blockIn 0.38s ease forwards;
    }

    footer { text-align: center; padding: 2rem; font-size: 12px; color: #333; flex-shrink: 0; }

    @media (max-width: 600px) {
      #banner-wrap { padding: 1rem 1rem 0; }
      .banner-slider { aspect-ratio: 16/7; border-radius: 12px; }
      .layout { flex-direction: column; padding: 1.25rem 1rem; gap: 1.25rem; }
      .sidebar.visible { display: block; width: 100%; position: static; }
      .main.visible { display: block; width: 100%; }
      .sidebar-label { margin-bottom: 8px; }
      #version-list { display: flex; flex-wrap: wrap; gap: 6px; }
      .version-item { margin-bottom: 0; padding: 6px 12px; }
      .v-date { display: none; }
      .latest-badge { margin-left: 4px; }
    }
  </style>
</head>
<body>

<header>
  <h1>업데이트 공지</h1>
  <span class="tag" id="header-version">로드 중...</span>
</header>

<div id="banner-wrap">
  <div class="banner-slider" id="banner-slider"></div>
  <div class="banner-dots" id="banner-dots"></div>
</div>

<div class="layout">
  <div id="loading">
    <div class="spinner"></div>
    패치노트를 불러오는 중...
  </div>
  <div id="error" style="display:none">업데이트 정보를 불러오지 못했습니다.</div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-label">버전 히스토리</div>
    <div id="version-list"></div>
  </aside>

  <main class="main" id="main">
    <div class="version-bar">
      <span class="version-text" id="version-text"></span>
      <span class="date-text" id="date-text"></span>
    </div>
    <div id="blocks"></div>
  </main>
</div>

<footer>DEX</footer>

<script>
const UPDATE_URL = './update.json';
const PLACEHOLDER = '<div class="card-img-placeholder"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#333" stroke-width="1.5"/></svg></div>';

let allData = null;
let imageCache = {};
let bannerTimer = null;
let bannerIndex = 0;
let bannerSlides = [];

function extractAssetId(imageStr) {
  if (!imageStr) return null;
  const match = imageStr.match(/(\d{6,})/);
  return match ? match[1] : null;
}

function isURL(str) {
  return str && (str.startsWith('http://') || str.startsWith('https://'));
}

async function fetchImageURLs(assetIds) {
  const uncached = assetIds.filter(id => !(id in imageCache));
  if (uncached.length === 0) return;
  try {
    const res = await fetch(
      `https://thumbnails.roproxy.com/v1/assets?assetIds=${uncached.join(',')}&returnPolicy=PlaceHolder&size=768x432&format=Png&isCircular=false`
    );
    if (res.ok) {
      const data = await res.json();
      (data.data || []).forEach(entry => {
        if (entry.state === 'Completed') {
          imageCache[String(entry.targetId)] = entry.imageUrl;
        }
      });
    }
  } catch (e) {
    console.error('이미지 fetch 실패:', e);
  }
}

async function load() {
  try {
    const res = await fetch(UPDATE_URL);
    if (!res.ok) throw new Error('fetch failed');
    allData = await res.json();

    const allAssetIds = [];
    const collect = (imageStr) => {
      if (!imageStr || isURL(imageStr)) return;
      const id = extractAssetId(imageStr);
      if (id && !allAssetIds.includes(id)) allAssetIds.push(id);
    };

    (allData.banners || []).forEach(b => collect(b.image));
    (allData.versions || []).forEach(v => {
      (v.blocks || []).forEach(b => { if (b.type === 'card') collect(b.image); });
    });

    if (allAssetIds.length > 0) await fetchImageURLs(allAssetIds);

    renderBanner();
    renderSidebar();

    const latest = allData.latest;
    const firstVer = (allData.versions || []).find(v => v.version === latest) || allData.versions[0];
    if (firstVer) renderVersion(firstVer, false);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('sidebar').classList.add('visible');
    document.getElementById('main').classList.add('visible');

  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function renderBanner() {
  const banners = allData.banners;
  if (!banners || banners.length === 0) return;

  const wrap = document.getElementById('banner-wrap');
  const slider = document.getElementById('banner-slider');
  const dotsEl = document.getElementById('banner-dots');

  bannerSlides = [];
  slider.innerHTML = '';
  dotsEl.innerHTML = '';

  banners.forEach((b, i) => {
    const slide = document.createElement('div');
    slide.className = 'banner-slide' + (i === 0 ? ' active' : '');

    const imgUrl = isURL(b.image) ? b.image : (imageCache[extractAssetId(b.image)] || null);
    if (imgUrl) {
      const img = document.createElement('img');
      img.src = imgUrl;
      img.alt = b.label || '';
      slide.appendChild(img);
    }

    if (b.label) {
      const label = document.createElement('div');
      label.className = 'banner-label';
      label.textContent = b.label;
      slide.appendChild(label);
    }

    slider.appendChild(slide);
    bannerSlides.push(slide);

    const dot = document.createElement('button');
    dot.className = 'banner-dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goBanner(i));
    dotsEl.appendChild(dot);
  });

  wrap.classList.add('visible');

  if (banners.length > 1) {
    bannerTimer = setInterval(() => goBanner((bannerIndex + 1) % bannerSlides.length), 3500);
  }
}

function goBanner(idx) {
  const dots = document.querySelectorAll('.banner-dot');
  bannerSlides[bannerIndex].classList.remove('active');
  if (dots[bannerIndex]) dots[bannerIndex].classList.remove('active');
  bannerIndex = idx;
  bannerSlides[bannerIndex].classList.add('active');
  if (dots[bannerIndex]) dots[bannerIndex].classList.add('active');
  clearInterval(bannerTimer);
  if (bannerSlides.length > 1) {
    bannerTimer = setInterval(() => goBanner((bannerIndex + 1) % bannerSlides.length), 3500);
  }
}

function renderSidebar() {
  const list = document.getElementById('version-list');
  list.innerHTML = '';
  const latest = allData.latest;

  (allData.versions || []).forEach(v => {
    const item = document.createElement('div');
    item.className = 'version-item';
    item.dataset.version = v.version;
    item.innerHTML = `
      <div class="v-dot"></div>
      <div class="version-item-inner">
        <span class="v-label">${v.version}</span>
        <span class="v-date">${v.date || ''}</span>
      </div>
      ${v.version === latest ? '<span class="latest-badge">최신</span>' : ''}
    `;
    item.addEventListener('click', () => {
      document.querySelectorAll('.version-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      renderVersion(v, true);
    });
    list.appendChild(item);
  });

  const latestItem = list.querySelector(`[data-version="${latest}"]`);
  if (latestItem) latestItem.classList.add('active');
}

function renderVersion(vData, scrollToMain) {
  document.getElementById('version-text').textContent = vData.version || '';
  document.getElementById('date-text').textContent = vData.date || '';
  document.getElementById('header-version').textContent = vData.version || '';
  document.title = '패치노트 ' + (vData.version || '');

  const blocksEl = document.getElementById('blocks');
  blocksEl.innerHTML = '';

  let blockIdx = 0;
  (vData.blocks || []).forEach(block => {
    if (block.type === 'title') {
      const el = document.createElement('div');
      el.className = 'section-title block-anim';
      el.style.animationDelay = (blockIdx * 60) + 'ms';
      el.textContent = block.text;
      blocksEl.appendChild(el);
      blockIdx++;

    } else if (block.type === 'card') {
      const isNew = block.subtitle && block.subtitle.includes('신규');
      const badgeClass = isNew ? 'badge-new' : 'badge-fix';

      const card = document.createElement('div');
      card.className = 'card block-anim';
      card.style.animationDelay = (blockIdx * 60) + 'ms';
      blockIdx++;

      const imgWrapper = document.createElement('div');
      const assetId = extractAssetId(block.image);
      const imageUrl = assetId ? imageCache[assetId] : null;

      if (imageUrl) {
        const img = document.createElement('img');
        img.className = 'card-img';
        img.src = imageUrl;
        img.onerror = function() { imgWrapper.innerHTML = PLACEHOLDER; };
        imgWrapper.appendChild(img);
      } else {
        imgWrapper.innerHTML = PLACEHOLDER;
      }
      card.appendChild(imgWrapper);

      const body = document.createElement('div');
      body.className = 'card-body';
      body.innerHTML =
        (block.subtitle ? `<div class="badge ${badgeClass}">${block.subtitle}</div>` : '') +
        `<div class="card-title">${block.title || ''}</div>` +
        `<div class="card-desc">${block.description || ''}</div>`;
      card.appendChild(body);
      blocksEl.appendChild(card);
    }
  });

  if (scrollToMain) {
    if (window.innerWidth <= 600) {
      document.getElementById('main').scrollIntoView({ behavior: 'smooth' });
    } else {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }
}

load();
</script>
</body>
</html>
