<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>패치노트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
    header { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; padding: 1.25rem 2rem; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; font-weight: 500; color: #fff; }
    header .tag { font-size: 11px; background: #2a2a2a; color: #aaa; padding: 3px 10px; border-radius: 99px; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
    .version-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .version-text { font-size: 26px; font-weight: 500; color: #fff; }
    .date-text { font-size: 13px; color: #666; }
    .section-title { font-size: 11px; font-weight: 500; color: #555; letter-spacing: 0.1em; text-transform: uppercase; margin: 2rem 0 0.75rem; padding-bottom: 8px; border-bottom: 1px solid #222; }
    .card { display: flex; gap: 16px; align-items: flex-start; background: #1a1a1a; border: 1px solid #252525; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; transition: border-color 0.15s; }
    .card:hover { border-color: #333; }
    .card-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: #222; flex-shrink: 0; }
    .card-img-placeholder { width: 60px; height: 60px; border-radius: 8px; background: #222; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .card-body { flex: 1; min-width: 0; }
    .card-subtitle { font-size: 11px; font-weight: 500; margin-bottom: 4px; }
    .card-title { font-size: 15px; font-weight: 500; color: #fff; margin-bottom: 6px; }
    .card-desc { font-size: 13px; color: #888; line-height: 1.65; }
    .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 99px; margin-bottom: 6px; }
    .badge-new { background: #0d2e1f; color: #4ade80; }
    .badge-fix { background: #2e1f0d; color: #f59e0b; }
    #loading { text-align: center; padding: 4rem; color: #444; font-size: 14px; }
    #error { text-align: center; padding: 4rem; color: #666; font-size: 14px; }
    footer { text-align: center; padding: 2rem; font-size: 12px; color: #333; }
  </style>
</head>
<body>

<header>
  <h1>업데이트 공지</h1>
  <span class="tag" id="header-version">로드 중...</span>
</header>

<div class="wrap">
  <div id="loading">패치노트를 불러오는 중...</div>
  <div id="error" style="display:none">업데이트 정보를 불러오지 못했습니다.</div>
  <div id="content" style="display:none">
    <div class="version-bar">
      <span class="version-text" id="version-text"></span>
      <span class="date-text" id="date-text"></span>
    </div>
    <div id="blocks"></div>
  </div>
</div>

<footer>DEX</footer>

<script>
const UPDATE_URL = './update.json';

async function load() {
  try {
    const res = await fetch(UPDATE_URL);
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

function render(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('version-text').textContent = data.version || '';
  document.getElementById('date-text').textContent = data.date || '';
  document.getElementById('header-version').textContent = data.version || '';
  document.title = '패치노트 ' + (data.version || '');

  const blocksEl = document.getElementById('blocks');
  blocksEl.innerHTML = '';

  (data.blocks || []).forEach(block => {
    if (block.type === 'title') {
      const el = document.createElement('div');
      el.className = 'section-title';
      el.textContent = block.text;
      blocksEl.appendChild(el);

    } else if (block.type === 'card') {
      const isNew = block.subtitle && block.subtitle.includes('신규');
      const badgeClass = isNew ? 'badge-new' : 'badge-fix';

      const imgHtml = block.image
        ? `<img class="card-img" src="${block.image}" onerror="this.outerHTML='<div class=card-img-placeholder><svg width=24 height=24 viewBox=\\'0 0 24 24\\' fill=none><circle cx=12 cy=12 r=10 stroke=#333 stroke-width=1.5/></svg></div>'" />`
        : `<div class="card-img-placeholder"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#333" stroke-width="1.5"/></svg></div>`;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        ${imgHtml}
        <div class="card-body">
          ${block.subtitle ? `<div class="badge ${badgeClass}">${block.subtitle}</div>` : ''}
          <div class="card-title">${block.title || ''}</div>
          <div class="card-desc">${block.description || ''}</div>
        </div>
      `;
      blocksEl.appendChild(card);
    }
  });
}

load();
</script>
</body>
</html>
